                    - generic [ref=e653]: Jan 2026 • Friends
                    - generic [ref=e655]:
                      - generic [ref=e658] [cursor=pointer]: We stayed at the Assiuolo with friends (including 2 Belgian nationals) for dinner on New Year's Eve (2025) and we spent a beautiful evening enjoying appetizers, first courses, main courses and desserts really tasty and quality, all prepared with great care. The same can be said for the wines brought to the table (own production and even awarded for several consecutive years by various wine guides). We returned with other people at the end of January and the choice was confirmed great! Next week we will return with the children and their companions and we will certainly make a good impression in all respects. The managers of the farm are really kind and caring people and put the utmost effort to provide a service that makes a difference. Congratulations! Franco and Paola
