                    - generic [ref=e1714]: Aug 2024 • Couples
                    - generic [ref=e1716]:
                      - generic [ref=e1719] [cursor=pointer]: Nestled in the hills of the Asti area among beautiful Barbera vineyards that seem to have just come out of the beautician, there is this wonderful Restaurant. Everything is taken care of in detail. The exterior recalls the old farmhouses of our grandparents where much of life took place outdoors between the farmyard and the barn. Inside the atmosphere is always very warm and welcoming but also very well cared for and elegant. It really feels like home. All immersed in the beautiful vineyards of Barbera. We had dinner outside under the beautiful porch. The atmosphere and the atmosphere helped to create a friendly situation even with the other diners to the point that at the end of the meal we uncorked a bottle and drank all together. The well-kept dishes, presented very well, very tasty with a look at tradition but revisited and updated in a modern key. A highly recommended place and absolutely to try.
