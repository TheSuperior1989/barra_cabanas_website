                      - generic [ref=e1213] [cursor=pointer]: A really pleasant discovery! We do not live far away, we have seen the sign a thousand times .. but we have never ventured... well, we did wrong! The place is really relaxing and quiet. We ate under the beautiful porch with the high roof near a nice brick wood-burning oven. The menu is a perfect mix of traditional dishes to which special "touches" are expertly added (for example black olives and mint with potato pie and Parmesan cream). The owners are nice and sympathetic and have really pampered us. We will definitely be back!
