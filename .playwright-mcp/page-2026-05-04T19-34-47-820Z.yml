                      - generic [ref=e1144] [cursor=pointer]: Don’t go to the assiuolo if you are in a hurry and want to eat the usual things. Here you live a space made of things thought and elaborated with love, created with raw materials that tell a story. The scent and taste of a sage leaf on a broccoli and anchovy mousse can make you close your eyes and take you far. They welcome you as at home and treat you with courtesy and attention. And maybe the price you pay for all this (40€) is too little. The menu is set and very rich with 3 starters, 2 first courses, 1 second course and 2 desserts and includes water and wine. All refined dishes and never banal.
