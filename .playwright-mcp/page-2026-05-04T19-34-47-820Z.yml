                      - generic [ref=e1650] [cursor=pointer]: The location is located along a narrow country road, on top of a hill, in a typical farmhouse of Monferrato, well preserved. It is run by two brothers, one is a cook, the other speaks at tables and serves the wine they produce. They prepare raw materials, such as tagliolini and agnolotti. They serve a menu with three appetizers, two first courses and a second course, dessert. I recommend the excellent barbera Amormio. Excellent value for money, 40 euros per person including water and a bottle of wine. The only flaw is the timing of the service, however thoughtful and precise. Being Easter lunch two and a half hours were acceptable. I'll be back.
