                    - generic [ref=e1324]:
                      - generic [ref=e1327] [cursor=pointer]: "Good morning to all users. Last Sunday with my wife and son we went to this nice restaurant. It was already a few years since I had the pleasure of coming...... I must say that what I like most about this place is its beauty in its simplicity, nothing is built or forced, but everything is in perfect harmony with the magnificent nature that surrounds it. The result is a magnificent lunch made in tranquility, in a peace and serenity that can not be found elsewhere...... Specifically, the lunch consisted of a set menu consisting of three appetizers, two first courses, the second and, of course, the dessert. Personally I really enjoyed a wonderful raw meat bar served as anticipated and the second consisting of pork shank and veal scoop: both of an unparalleled softness. During the meal we drank a bottle of Barbera called Merum, a truly exceptional wine, even best Italian wine in the Yearbook of the best Italian wines. All for 40,00 euros wine and drinks including, in addition, a small discount for my 15-year-old son. I think it's more difficult to want. Living very far from Montegrosso d 'Asti I do not know when I can return, but, of course, I would recommend everyone to do it"
